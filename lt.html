<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lower Thirds Engine</title>
<style>
  :root{
    --bg:#0d1117; --panel:#141b23; --panel2:#1b232d; --panel3:#222c38; --line:#262f3b;
    --ink:#e6edf3; --muted:#8b98a6; --faint:#5c6773;
    --accent:#ffb02e; --accent-d:#c98612;
    --live:#ff3b30; --ok:#30d158; --standby:#ffd60a; --pv:#3aa0ff;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --ui:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);
       -webkit-font-smoothing:antialiased;overflow:hidden}
  button,input,select,textarea{font-family:inherit;color:inherit}
  button{cursor:pointer}

  body.output{background:transparent;overflow:hidden}
  body.output.bg-green{background:#00b140}
  body.output.bg-black{background:#000}
  body.output #console-root{display:none}
  body.console #output-root{display:none}

  /* ============ OUTPUT / shared stage ============ */
  #output-root{position:fixed;inset:0;overflow:hidden}
  .scaler{position:absolute;top:50%;left:50%;width:1920px;height:1080px;
    transform-origin:center;will-change:transform}

  .lt-el{position:absolute;will-change:transform,opacity}
  .lt-box{width:100%;height:100%;display:flex;overflow:hidden;position:relative}
  .lt-media{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none;background-position:center}
  .lt-media img,.lt-media video{width:100%;height:100%;display:block}
  .lt-scrim{position:absolute;inset:0;z-index:1;pointer-events:none;display:none}
  .lt-accent{flex:none;align-self:stretch;position:relative;z-index:2}
  .lt-content{flex:1;min-width:0;display:flex;flex-direction:column;
    justify-content:center;overflow:hidden;position:relative;z-index:2}
  .lt-content.va-top{justify-content:flex-start}
  .lt-content.va-bottom{justify-content:flex-end}
  .lt-content.marqfill{justify-content:center}
  .lt-shine{position:absolute;inset:0;z-index:3;pointer-events:none;display:none;overflow:hidden;border-radius:inherit}
  .lt-shine .gleam{position:absolute;top:-25%;bottom:-25%;left:0;width:38%;transform:translateX(-130%) skewX(-18deg);
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent)}
  .lt-marq{position:relative;width:100%;max-width:100%;overflow:hidden}
  .lt-marq.vert{height:100%}
  .lt-track{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform}
  .lt-track.col{display:flex;flex-direction:column;white-space:normal;align-items:inherit}
  .lt-track .mline{white-space:nowrap}
  .media-hint{display:none;align-items:center;justify-content:center;width:100%;height:100%;
    color:#9fb0c0;font-size:17px;text-align:center;border:2px dashed #3a4a5e;border-radius:8px;padding:18px}
  .r-ref{display:block;line-height:1.05;margin:0 0 .3em}
  .r-ref .tr{font-size:.62em;opacity:.72;margin-left:.5em;letter-spacing:.06em}
  .r-body,.t-text,.n-name,.s-title{display:block}
  .n-title,.s-sub{display:block;margin-top:.22em}
  .clamp{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
  .b-list{list-style:none;margin:0;padding:0;display:block}
  .b-list li{display:flex;align-items:flex-start;gap:.5em;margin:.18em 0}
  .b-list li .mk{flex:none;opacity:.9}
  .h-label{text-transform:uppercase;letter-spacing:.2em;font-weight:600;
    margin-bottom:.5em;display:block}
  .h-items{display:flex;flex-direction:column;gap:.32em}
  .h-chip{display:flex;align-items:center;gap:.55em;border-radius:8px;will-change:transform,opacity}
  .h-chip .bar{width:4px;align-self:stretch;border-radius:3px;flex:none}

  /* selection + handles (preview only) */
  .lt-el.interactive{cursor:move}
  .lt-el.selected{outline:2px solid var(--pv);outline-offset:2px}
  .lt-handle{position:absolute;width:26px;height:26px;border-radius:50%;
    background:var(--pv);border:3px solid #0a0e14;display:none;z-index:50;
    transform:translate(-50%,-50%)}
  .lt-el.selected.interactive .lt-handle{display:block}
  .h-nw{left:0;top:0;cursor:nwse-resize}
  .h-ne{left:100%;top:0;cursor:nesw-resize}
  .h-sw{left:0;top:100%;cursor:nesw-resize}
  .h-se{left:100%;top:100%;cursor:nwse-resize}

  /* ============ CONSOLE ============ */
  #console-root{display:grid;grid-template-columns:400px 1fr;height:100%}
  @media(max-width:1000px){#console-root{grid-template-columns:1fr;overflow:auto}}

  .side{background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0}
  .side-head{padding:14px 16px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none}
  .dot.ok{background:var(--ok);box-shadow:0 0 9px var(--ok)}
  .dot.err{background:var(--live);box-shadow:0 0 9px var(--live)}
  .dot.try{background:var(--standby);box-shadow:0 0 9px var(--standby);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  .tag{margin:6px 0 0;font-size:11px;color:var(--muted)}
  .relaypill{margin-top:9px;font-size:11px;font-family:var(--mono);color:var(--faint);
    display:flex;align-items:center;gap:6px}
  .relaypill .d{width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .relaypill.on .d{background:var(--ok)}

  .transbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
    padding:12px 16px 6px;background:#0a0e14}
  .tb-side{display:flex;align-items:center}
  .tb-center{display:flex;flex-direction:column;align-items:center;gap:3px}
  .tb-cap{font-size:10.5px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .tb-revert{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border:1px solid var(--line);
    background:var(--panel2);border-radius:8px;font-size:12px;font-weight:600;color:var(--muted)}
  .tb-revert:hover{border-color:#46566a;color:var(--ink)}
  .transition{display:inline-flex;align-items:center;gap:10px;padding:11px 34px;border:0;border-radius:9px;
    background:linear-gradient(180deg,#ff4b42,#e2342b);color:#fff;font-size:15px;font-weight:800;
    letter-spacing:.14em;cursor:pointer;box-shadow:0 6px 20px rgba(226,52,43,.4),inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .08s,box-shadow .15s}
  .transition:hover{box-shadow:0 8px 26px rgba(226,52,43,.55),inset 0 1px 0 rgba(255,255,255,.3)}
  .transition:active{transform:translateY(1px)}
  .transition svg{opacity:.95}
  .transition.flashok{background:linear-gradient(180deg,#34d36a,#1fae53);
    box-shadow:0 6px 20px rgba(48,209,88,.5),inset 0 1px 0 rgba(255,255,255,.3)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:9px 13px;border:1px solid var(--line);background:var(--panel2);
    border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap}
  .btn:hover{border-color:#3a4654}
  .btn.full{width:100%}
  .btn.primary{background:var(--accent);color:#1a1205;border-color:var(--accent)}
  .btn.primary:hover{background:#ffbe54}
  .btn.take{background:var(--live);color:#fff;border-color:var(--live);flex:1;font-size:14px}
  .btn.take:hover{background:#ff5a52}
  .btn.ghost{background:transparent}
  .btn.danger{color:#ff8a82;border-color:#3a2a2a;background:transparent}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.tiny{padding:4px 8px;font-size:11px;border-radius:6px}

  .scroll{overflow:auto;flex:1;min-height:0;padding-bottom:40px}
  .scroll::-webkit-scrollbar{width:10px}
  .scroll::-webkit-scrollbar-thumb{background:#2b3542;border-radius:6px;border:2px solid var(--panel)}

  details.sec{border-bottom:1px solid var(--line)}
  details.sec>summary{list-style:none;padding:12px 16px;cursor:pointer;font-size:12px;
    letter-spacing:.09em;text-transform:uppercase;font-weight:600;display:flex;
    align-items:center;justify-content:space-between;user-select:none}
  details.sec>summary::-webkit-details-marker{display:none}
  details.sec>summary .chev{color:var(--faint);transition:transform .2s}
  details.sec[open]>summary .chev{transform:rotate(90deg)}
  .secbody{padding:2px 16px 16px}

  .fld{font-size:12px;color:var(--muted);display:block;margin:11px 0 5px;letter-spacing:.02em}
  .fld:first-child{margin-top:3px}
  .hint{font-size:11px;color:var(--faint);margin:6px 0 0;line-height:1.45}
  .row{display:flex;align-items:center;gap:9px;margin:8px 0}
  .row.split>*{flex:1;min-width:0}
  .grp{border:1px solid var(--line);border-radius:9px;padding:4px 11px 11px;margin:11px 0;background:var(--panel)}
  .grp>.gh{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);
    font-weight:600;margin:9px 0 2px}

  input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent-d)}
  input[type=number]{font-family:var(--mono)}
  textarea{resize:vertical;min-height:56px;line-height:1.4;font-size:13px}
  select{appearance:none;background-image:
    linear-gradient(45deg,transparent 50%,var(--muted) 50%),
    linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 15px) 15px,calc(100% - 10px) 15px;
    background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:28px}
  input[type=color]{width:36px;height:30px;padding:2px;background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;cursor:pointer;flex:none}
  .cw{display:flex;align-items:center;gap:7px}
  .cw input[type=text]{font-family:var(--mono);font-size:12px}
  input[type=range]{width:100%;accent-color:var(--accent);height:20px}
  .rv{font-family:var(--mono);font-size:12px;color:var(--accent);min-width:44px;text-align:right}

  .sw{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;
    user-select:none;margin:8px 0}
  .sw input{display:none}
  .sw .tk{width:36px;height:21px;border-radius:11px;background:#2b3542;position:relative;
    transition:background .18s;flex:none}
  .sw .tk::after{content:"";position:absolute;top:3px;left:3px;width:15px;height:15px;
    border-radius:50%;background:#8b98a6;transition:.18s}
  .sw input:checked+.tk{background:var(--accent-d)}
  .sw input:checked+.tk::after{transform:translateX(15px);background:#fff}

  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{flex:1;padding:7px 5px;background:transparent;border:0;font-size:11.5px;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#1a1205;font-weight:700}

  /* element list */
  .ellist{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .elrow{display:flex;align-items:center;gap:8px;padding:8px 9px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel2);font-size:13px}
  .elrow.sel{border-color:var(--pv);background:#16263a}
  .elrow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .elrow .ty{font-size:10px;color:var(--faint);font-family:var(--mono);text-transform:uppercase}
  .ic{width:28px;height:26px;display:inline-flex;align-items:center;justify-content:center;flex:none;
    border:1px solid var(--line);border-radius:6px;background:var(--panel2);color:var(--muted);
    font-size:12px;padding:0;transition:border-color .15s,color .15s,background .15s}
  .ic:hover{border-color:#46566a;color:var(--ink);background:var(--panel3)}
  .ic svg{width:15px;height:15px;display:block}
  .ic.on{color:var(--ok);border-color:#2c5740;background:rgba(48,209,88,.08)}
  .ic.danger:hover{color:#ff8a82;border-color:#5a3030;background:rgba(255,80,80,.08)}
  .addmenu{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

  /* preset tree */
  .folder{border:1px solid var(--line);border-radius:9px;margin:8px 0;overflow:hidden}
  .folder>.fh{display:flex;align-items:center;gap:8px;padding:9px 9px;background:var(--panel2);font-size:12.5px;font-weight:600}
  .folder>.fh .fico{color:var(--accent);display:flex}.folder>.fh .fico svg{width:15px;height:15px}
  .folder>.fh .fn{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .preset{display:flex;align-items:center;gap:8px;padding:7px 9px 7px 26px;font-size:12.5px;border-top:1px solid var(--line)}
  .preset .pn{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .preset .pn:hover,.folder>.fh .fn:hover{color:var(--accent)}

  /* main / monitors */
  .main{display:flex;flex-direction:column;min-height:0;background:#0a0e14}
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #161d27;
    background:#0c1119;flex-wrap:wrap}
  .urlbox{flex:1;min-width:180px;display:flex;align-items:center;gap:7px;background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;padding:5px 5px 5px 10px}
  .urlbox input{border:0;background:transparent;font-family:var(--mono);font-size:11px;padding:3px 0}
  .urlmode{flex:none;width:240px}
  .urlmode button{display:flex;align-items:center;justify-content:center;gap:5px}
  .reldot{width:7px;height:7px;border-radius:50%;background:var(--faint);display:inline-block}
  .reldot.on{background:var(--ok);box-shadow:0 0 7px var(--ok)}
  .urlhint{flex-basis:100%;font-size:11px;color:var(--faint);line-height:1.5}
  .urlhint code{font-size:10.5px}
  .mons{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 16px;min-height:0}
  @media(max-width:1400px){.mons{grid-template-columns:1fr}}
  .moncol{display:flex;flex-direction:column;min-height:0}
  .montitle{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;font-weight:700;margin-bottom:8px;color:var(--muted)}
  .montitle .lamp{width:10px;height:10px;border-radius:50%;background:var(--faint)}
  .montitle.pv{color:var(--pv)} .montitle.pv .lamp{background:var(--pv)}
  .montitle.pg.on{color:#fff} .montitle.pg.on .lamp{background:var(--live);box-shadow:0 0 10px var(--live);animation:pulse 1.4s infinite}
  .monitor{width:100%;aspect-ratio:16/9;position:relative;background:#11151c;border-radius:6px;
    overflow:hidden;box-shadow:0 0 0 1px #232c38}
  .monitor .bg{position:absolute;inset:0;background:linear-gradient(120deg,#1d2733,#11161e 60%,#0c1118)}
  .monitor.green .bg{background:#00b140}
  .monitor.black .bg{background:#000}
  .pstage{position:absolute;inset:0}
  .safe{position:absolute;inset:0;display:none;pointer-events:none}
  .simrow{display:flex;gap:8px;padding:10px 16px;border-top:1px solid #161d27;background:#0c1119;
    flex-wrap:wrap;align-items:center}
  .simrow .lbl{font-size:11px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-right:2px}
  .simbtn{padding:6px 11px;border:1px solid var(--line);background:var(--panel2);border-radius:7px;
    font-size:12px;font-weight:600}
  .simbtn:hover{border-color:#3a4654}
  .simbtn.on{border-color:var(--accent-d);color:var(--accent)}
  code{font-family:var(--mono);background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:.9em;color:#ffd089}
  .empty{color:var(--faint);font-size:12px;padding:10px 2px;line-height:1.5}

  /* ===================== VIEW SWITCHER ===================== */
  /* ===================== TAKE STATE + PROGRAM ON-AIR ===================== */
  .transition.pending{box-shadow:0 0 0 3px rgba(255,64,54,.35),0 8px 26px rgba(255,64,54,.4);animation:takepulse 1.5s infinite}
  @keyframes takepulse{0%,100%{box-shadow:0 0 0 3px rgba(255,64,54,.30),0 8px 22px rgba(255,64,54,.35)}50%{box-shadow:0 0 0 6px rgba(255,64,54,.16),0 10px 30px rgba(255,64,54,.5)}}
  .transition.synced{background:linear-gradient(180deg,#1f7d3a,#176030)!important;box-shadow:none;opacity:.92}
  .transition.synced svg path{stroke:#bfe9cb}
  /* Program monitor: unmistakable ON AIR */
  #pgMon{position:relative}
  #pgMon::after{content:"\25CF ON AIR";position:absolute;top:8px;right:10px;z-index:5;
    font-size:11px;font-weight:800;letter-spacing:.14em;color:#fff;background:var(--live);
    padding:3px 9px;border-radius:6px;box-shadow:0 2px 8px rgba(255,59,48,.5);pointer-events:none}
  #pgMon{outline:2px solid rgba(255,59,48,.55);outline-offset:0}
  #pgMon.pending-diff{outline-color:rgba(255,176,46,.7)}
  #pgMon.pending-diff::before{content:"PREVIEW NOT YET TAKEN";position:absolute;top:8px;left:10px;z-index:5;
    font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#1a1205;background:var(--accent);
    padding:3px 8px;border-radius:6px;pointer-events:none}
  .montitle.pg{color:#ff6a61}

  .viewswitch{position:fixed;top:10px;right:14px;z-index:60;display:flex;align-items:center;gap:6px;
    background:rgba(12,17,25,.9);border:1px solid var(--line);border-radius:10px;padding:5px 7px;backdrop-filter:blur(8px)}
  .viewswitch .vs-lbl{font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin:0 2px}
  .viewswitch button{padding:6px 12px;border:0;background:transparent;color:var(--muted);border-radius:7px;font-size:12.5px;font-weight:700}
  .viewswitch button:hover{color:var(--ink)}
  .viewswitch button.on{background:var(--accent);color:#1a1205}

  /* status strip + looks board hidden in Builder */
  .opstatus,.oplooks{display:none}

  /* ===================== OPERATOR (shared) ===================== */
  #console-root.op .side{display:none}
  #console-root.op .topbar{display:none}
  #console-root.op .main{padding:0}
  #console-root.op .opstatus{display:flex;align-items:center;gap:18px;padding:14px 20px 12px;flex-wrap:wrap}
  #console-root.op .oplooks{display:block}
  #console-root.op .mons{padding:6px 20px 4px;gap:18px}
  #console-root.op .montitle{font-size:14px}
  #console-root.op .transbar{padding:10px 20px}
  #console-root.op .transition{transform:scale(1.18);transform-origin:center}
  #console-root.op .simrow{padding:10px 20px}

  .opstatus{border-bottom:1px solid #161d27}
  .ops-cell{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
  .ops-dot{width:11px;height:11px;border-radius:50%;background:#5c6773;box-shadow:0 0 0 0 rgba(0,0,0,0)}
  .ops-dot.ok{background:var(--ok);box-shadow:0 0 10px rgba(48,209,88,.7)}
  .ops-dot.err{background:var(--live)}
  .ops-k{font-size:11px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
  .ops-v{font-variant-numeric:tabular-nums}
  .ops-air{margin-left:auto;padding:6px 14px;border-radius:999px;border:1px solid var(--line);letter-spacing:.14em;font-size:12px}
  .ops-airdot{width:10px;height:10px;border-radius:50%;background:#5c6773}
  .ops-air.live{background:rgba(255,59,48,.16);border-color:var(--live);color:#ff6a61}
  .ops-air.live .ops-airdot{background:var(--live);box-shadow:0 0 12px rgba(255,59,48,.9);animation:airpulse 1.6s infinite}
  @keyframes airpulse{0%,100%{opacity:1}50%{opacity:.35}}
  .ops-clock{font-variant-numeric:tabular-nums;color:var(--muted);font-size:13px}

  .oplooks{padding:8px 20px 14px}
  .ol-head{display:flex;align-items:baseline;gap:12px;margin:0 0 10px}
  .ol-title{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
  .ol-hint{font-size:12px;color:var(--faint)}
  .ol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .ol-tile{position:relative;border:1px solid var(--line);background:var(--panel2);border-radius:12px;
    padding:14px 14px;min-height:64px;display:flex;flex-direction:column;justify-content:center;gap:4px;
    text-align:left;font-weight:700;color:var(--ink);transition:transform .08s,border-color .12s,background .12s}
  .ol-tile:hover{border-color:#3a4654;transform:translateY(-1px)}
  .ol-tile:active{transform:translateY(0)}
  .ol-tile .t-name{font-size:15px;line-height:1.2}
  .ol-tile .t-sub{font-size:11px;color:var(--faint);font-weight:600}
  .ol-tile.sel{border-color:var(--pv);box-shadow:0 0 0 1px var(--pv) inset;background:#10202e}
  .ol-tile.blank{border-style:dashed;color:var(--muted)}
  .ol-empty{color:var(--faint);font-size:13px;padding:8px 2px}

const TYPE_LABELS={scripture:"Scripture",reference:"Reference",sermonTitle:"Sermon title",
  bulletList:"Bullet list",history:"Scripture ref list",eventList:"Event list",name:"Name/title",text:"Text",media:"Image / Media"};
const ADD_TYPES=["scripture","reference","name","sermonTitle","bulletList","history","eventList","text","media"];

/* ============================================================= SCRIPTURE PARSER */
const BOOKS=("Genesis|Exodus|Leviticus|Numbers|Deuteronomy|Joshua|Judges|Ruth|1 Samuel|2 Samuel|"+
 "1 Kings|2 Kings|1 Chronicles|2 Chronicles|Ezra|Nehemiah|Esther|Job|Psalms|Psalm|Proverbs|"+
 "Ecclesiastes|Song of Solomon|Song of Songs|Isaiah|Jeremiah|Lamentations|Ezekiel|Daniel|Hosea|"+
 "Joel|Amos|Obadiah|Jonah|Micah|Nahum|Habakkuk|Zephaniah|Haggai|Zechariah|Malachi|Matthew|Mark|"+
 "Luke|John|Acts|Romans|1 Corinthians|2 Corinthians|Galatians|Ephesians|Philippians|Colossians|"+
 "1 Thessalonians|2 Thessalonians|1 Timothy|2 Timothy|Titus|Philemon|Hebrews|James|1 Peter|2 Peter|"+
 "1 John|2 John|3 John|Jude|Revelation|Gen|Exod|Lev|Num|Deut|Josh|Judg|1 Sam|2 Sam|1 Kgs|2 Kgs|"+
 "1 Chr|2 Chr|Neh|Est|Pss|Ps|Prov|Eccl|Isa|Jer|Lam|Ezek|Dan|Hos|Obad|Jon|Mic|Nah|Hab|Zeph|Hag|"+
 "Zech|Mal|Matt|Mt|Mk|Lk|Jn|Rom|1 Cor|2 Cor|Gal|Eph|Phil|Col|1 Thess|2 Thess|1 Tim|2 Tim|Tit|"+
 "Phlm|Heb|Jas|1 Pet|2 Pet|1 Jn|2 Jn|3 Jn|Rev").split("|").map(s=>s.trim());
BOOKS.sort((a,b)=>b.length-a.length);
const BOOK_RE=BOOKS.map(b=>b.replace(/ /g,"\\s+").replace(/\./g,"\\.")).join("|");
const REF_CORE="((?:"+BOOK_RE+")\\.?)\\s+(\\d+)\\s*[:.]\\s*(\\d+)(?:\\s*[\\-\\u2013\\u2014]\\s*(\\d+))?";
const TR_RE="(?:\\s*\\(?([A-Z]{2,6}\\d?)\\)?)?";
const REF_FULL=new RegExp("\\b"+REF_CORE+TR_RE,"i");
const REF_LINE=new RegExp("^\\s*"+REF_CORE+TR_RE+"\\s*$","i");
const REF_CORE_ONLY=new RegExp("\\b"+REF_CORE,"i");   // reference without the optional translation tag
// A real translation tag is UPPERCASE (KJV, NIV, ESV, NASB95). The reference regexes are
// case-insensitive, so [A-Z]{2,6} also matches lowercase — without this guard the parser
// eats the first verse word (e.g. "John 3:16 For God..." -> tag "For", body "God...").
function isTr(s){ return !!s && /^[A-Z]{2,6}\d?$/.test(s); }
function tidyRef(m){let book=m[1].replace(/\s+/g," ").replace(/\.$/,"");
  let r=book+" "+m[2]+":"+m[3]; if(m[4])r+="-"+m[4]; return r;}
function parseScripture(text){
  if(!text)return null; const raw=text.replace(/\r/g,""); const lines=raw.split("\n");
  for(let i=0;i<lines.length;i++){const m=lines[i].match(REF_LINE);
    if(m){const tr=isTr(m[5])?m[5]:"";
      const rest=lines.slice(0,i).concat(lines.slice(i+1)).join("\n").trim();
      return {ref:tidyRef(m),translation:tr,body:rest,rawText:raw.trim()};}}
  const m=raw.match(REF_FULL);
  if(m){const tr=isTr(m[5])?m[5]:"";
    // when m[5] isn't a real (uppercase) tag it's actually the first body word —
    // strip only the reference itself so that word stays in the body.
    const refSpan=tr?m[0]:(raw.match(REF_CORE_ONLY)||[m[0]])[0];
    const body=raw.replace(refSpan,"").replace(/\s{2,}/g," ").trim();
    return {ref:tidyRef(m),translation:tr,body,rawText:raw.trim()};}
  return null;
}

/* ============================================================= PERSISTENCE + BUS */
const LS_PROGRAM="pplt.program.v2", LS_PREVIEW="pplt.preview.v2", LS_PRESETS="pplt.presets.v2";
const RELAY_PORT=7777;
function lsGet(k,fb){try{const r=localStorage.getItem(k);return r?deepMerge(fb,JSON.parse(r)):clone(fb);}catch(e){return clone(fb);}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadPresets(){try{const r=localStorage.getItem(LS_PRESETS);if(r)return JSON.parse(r);}catch(e){}
  return {folders:[{id:uid(),name:"My Presets",items:[]}]};}

// served by relay over http(s); standalone over file://
const SERVED=location.protocol!=="file:";
function relayBase(){ return SERVED? location.origin : ("http://localhost:"+RELAY_PORT); }

function createBus(){
  let onProg=null, es=null, relayOk=false, statusCb=null;
  let bc=null; try{bc=new BroadcastChannel("pplt");}catch(e){}
  function connectSSE(){
    try{
      es=new EventSource(relayBase()+"/events");
      es.onmessage=(ev)=>{ try{const d=JSON.parse(ev.data); if(d&&d.type==="program"&&onProg)onProg(d.cfg);}catch(e){} };
      es.onopen=()=>{ relayOk=true; statusCb&&statusCb(true); };
      es.onerror=()=>{ relayOk=false; statusCb&&statusCb(false); };

/* ============================================================= PROPRESENTER CLIENT */
function ppUrl(host,port,path){
  const target=`http://${host}:${port}${path}`;
  if(location.protocol==="file:") return target;            // direct
  return relayBase()+"/pp?target="+encodeURIComponent(target); // via relay proxy (no CORS)
}
function slideLayerActive(layers){
  if(layers==null) return null;
  if(layers.data!==undefined) return slideLayerActive(layers.data);
  if(Array.isArray(layers)){
    for(const x of layers){ const nm=(x.name||x.id||x.layer||"").toString().toLowerCase();
      if(nm==="slide"||nm==="slides") return !!(x.status??x.active??x.value??x.on??x.enabled); }
    return null;
  }
  if(typeof layers==="object"){
    if("slide" in layers) return !!layers.slide;
    if("Slide" in layers) return !!layers.Slide;
  }
  return null;
}
// True when EVERY visual layer is inactive (i.e. ProPresenter "Clear All" / F1).
// Audio is ignored (background music doesn't count as on-screen content).
function layerOn(v){ if(typeof v==="boolean")return v;
  if(v&&typeof v==="object")return !!(v.status??v.active??v.value??v.on??v.enabled); return null; }
function allLayersClear(layers){
  if(layers==null) return null;
  if(layers.data!==undefined) return allLayersClear(layers.data);
  let any=false, active=false;
  const consider=(nm,v)=>{ if((nm||"").toString().toLowerCase()==="audio")return;
    const on=layerOn(v); if(on===null)return; any=true; if(on)active=true; };
  if(Array.isArray(layers)){ layers.forEach(x=>consider(x.name||x.id||x.layer,x)); }
  else if(typeof layers==="object"){ for(const k in layers)consider(k,layers[k]); }
  if(!any) return null;        // shape not understood
  return !active;              // true = all visual layers off = Clear All
}
// Normalize ProPresenter's layer status into a flat {layerName: bool} map
// (handles the flat-object shape and array/data-wrapped variants).
function normLayers(layers){
  if(layers==null) return null;
  if(layers.data!==undefined) return normLayers(layers.data);
  const out={};
  if(Array.isArray(layers)){ layers.forEach(x=>{ const nm=(x.name||x.id||x.layer||"").toString().toLowerCase(); if(nm){ const on=layerOn(x); if(on!==null) out[nm]=on; } }); }
  else if(typeof layers==="object"){ for(const k in layers){ const on=layerOn(layers[k]); if(on!==null) out[k.toLowerCase()]=on; } }
  return out;
}
// Decide whether a clear event should wipe the scripture reference list, per the
// operator's chosen rule. Evaluated only while the slide is in a cleared state.
function isFullClear(rule, layer, signals){
  if(!signals) return false;
  switch(rule){
    case "manual": return false;
    case "pres":   return signals.presPopulated===false;          // ProPresenter cleared the active presentation (Clear All)
    case "layer":  { const m=signals.layers||{}; return m[layer]===false; }  // the chosen distinguishing layer went off
    case "all":
    default:       return signals.allOff===true;                  // every visual layer off
  }
}
function createPP(opts){
  let host,port,pollMs,timer=null,running=false,lastKey="",lastSigKey="",supportsLayers=true;
  let lastActive=null,lastAllClr=null,lastLayers=null,lastPres=null;
  async function tick(){
    if(!running)return;
    let slideText="",active=null,allClr=null,slideOk=false,layersMap=lastLayers,presPop=lastPres;
    try{
      const r=await fetch(ppUrl(host,port,"/v1/status/slide"),{cache:"no-store"});
      if(r.ok){ const d=await r.json(); const dd=(d&&d.data&&(d.current||d.next)?d:(d.data||d));
        const cur=dd&&dd.current; slideText=cur&&cur.text!=null?cur.text:""; slideOk=true; opts.onReach&&opts.onReach(true); }
      else { opts.onReach&&opts.onReach(false); }
    }catch(e){ opts.onReach&&opts.onReach(false,e); }
    // A failed slide poll (network blip / PP busy) must NOT blank the on-air verse:
    // hold the last good state and try again next tick.
    if(!slideOk){ timer=setTimeout(tick,pollMs); return; }
    if(supportsLayers){
      let layerOkThisTick=false;
      try{ const lr=await fetch(ppUrl(host,port,"/v1/status/layers"),{cache:"no-store"});
        if(lr.ok){ const lj=await lr.json(); const a=slideLayerActive(lj);
          if(a===null){ supportsLayers=false; }                 // genuine: this build doesn't report layer status
          else { active=a; allClr=allLayersClear(lj); layersMap=normLayers(lj); lastActive=active; lastAllClr=allClr; lastLayers=layersMap; layerOkThisTick=true; } }
        // a non-ok layers status is transient — do NOT latch supportsLayers off
      }catch(e){ /* transient layers failure — do NOT latch off; retry next tick */ }
      // on a transient layers miss, reuse the last good reading instead of flapping
      if(supportsLayers && !layerOkThisTick){ active=lastActive; allClr=lastAllClr; layersMap=lastLayers; }
    }
    // presentation/active distinguishes Clear All (presentation cleared -> null) from
    // Clear Slide (slide hidden but the presentation stays active -> populated). Hold last on a blip.
    try{ const pr=await fetch(ppUrl(host,port,"/v1/presentation/active"),{cache:"no-store"});
      if(pr.ok){ const pj=await pr.json(); const pd=(pj&&pj.data)||pj||{}; presPop=(pd.presentation!=null); lastPres=presPop; }
    }catch(e){ /* transient — hold last */ }
    // clear when layer inactive (preferred) OR no text;  clearAll = every visual layer off (F1)
    const cleared = (active===false) || (active===null && !slideText.trim());
    const clearAll = (allClr===true);
    const signals = { layers:layersMap, presPopulated:presPop, allOff:clearAll };
    const sigKey = active+"|"+presPop+"|"+JSON.stringify(layersMap||0);
    if(sigKey!==lastSigKey){ lastSigKey=sigKey; opts.onSignals && opts.onSignals(signals); }
    const key=(cleared?"__CLEAR__":slideText)+"|"+active+"|"+clearAll+"|"+presPop;
    if(key!==lastKey){ lastKey=key; opts.onUpdate(cleared?"":slideText, active, clearAll, signals); }
    timer=setTimeout(tick,pollMs);
  }
  return {
    connect(h,p,ms){ this.stop(); host=h;port=p;pollMs=ms||200;running=true;supportsLayers=true;lastKey="";lastSigKey="";lastActive=null;lastAllClr=null;lastLayers=null;lastPres=null;tick(); },
    stop(){ running=false; if(timer){clearTimeout(timer);timer=null;} },
    layersSupported(){return supportsLayers;}
  };
}

  // ONE live log of scripture refs. It is fed ONLY by the live ProPresenter feed
  // (or the manual "Add test verse" button). Sample-verse buttons and preview edits
  // never touch it, so nothing from preview leaks into the live/program list.
  let liveLog=[], logId=0;
  function pushLog(ref){ if(!ref)return; const last=liveLog[liveLog.length-1]; if(last&&last.ref===ref)return;
    liveLog.push({id:++logId,ref}); pvStage.setHistory(liveLog); pgStage.setHistory(liveLog); }
  function clearLog(){ liveLog.length=0; pvStage.setHistory(liveLog); pgStage.setHistory(liveLog); }
  // manual "Clear list now" — clears the console log AND tells the OBS output to clear (nonce on the published config)
  let _clearNonce=0;
  function manualClearList(){ clearLog(); _clearNonce=Math.max(Date.now(),_clearNonce+1); const c=clone(program); c._clearHist=_clearNonce; bus.publish(c); }
  // live readout of the clear-detection signals (layer states + presentation status) for the Clear Behavior panel
  let _lastSignals=null;
  function renderClearDiag(s){ if(s)_lastSignals=s; const box=$("clearDiag"); if(!box||!_lastSignals)return;
    const m=_lastSignals.layers||{};
    const chip=(n)=>{ const on=m[n]===true; return '<span style="display:inline-block;padding:2px 7px;margin:2px;border-radius:6px;font-family:var(--mono,monospace);font-size:11px;'+(on?'color:#06210f;background:#48e08a;font-weight:700':'color:var(--muted,#8aa);background:rgba(255,255,255,.05)')+'">'+n+'</span>'; };
    const names=["slide","media","props","messages","announcements","audio","video_input"];
    const pres=_lastSignals.presPopulated===true?"Active":_lastSignals.presPopulated===false?"Cleared":"—";
    box.innerHTML=names.map(chip).join("")+'<div style="margin-top:5px;font-family:var(--mono,monospace);font-size:11px;color:var(--muted,#8aa)">presentation: <b style="color:var(--ink,#eef)">'+pres+'</b></div>'; }
  const pvMonTally={el:document.querySelector(".montitle.pv")};
  function setTally(t,on){ if(t&&t.el)t.el.classList.toggle("on",on); }

  // sample buttons only drive the PREVIEW main scripture (for styling) — they do NOT log
  $("simV1").onclick=()=>{ liveMode&&toggleLive(false); pvStage.setLive(SAMPLE1); setTally(pvMonTally,true); };
  $("simV2").onclick=()=>{ liveMode&&toggleLive(false); pvStage.setLive(SAMPLE2); setTally(pvMonTally,true); };
  $("simName").onclick=()=>{ liveMode&&toggleLive(false); pvStage.setLive(SAMPLEN); setTally(pvMonTally,true); };
  $("simClear").onclick=()=>{ pvStage.setLive(null); setTally(pvMonTally,false); };
  function toggleLive(v){ liveMode=v; $("simLive").classList.toggle("on",v);
    $("simLive").textContent="Live ProPresenter feed: "+(v?"ON":"OFF");
    if(v){ startConsolePP(); } }
  $("simLive").onclick=()=>toggleLive(!liveMode);

  /* ---- console PP client: live feed is the ONLY thing that logs scripture refs ---- */
  function historyWantsClear(cfg){ return (cfg&&cfg.elements||[]).some(e=>e&&e.type==="history"&&e.clearOnAll!==false); }
  function onSlide(text,active,clearAll,signals){
    const sc=text?parseScripture(text):null;
    let liveData=null;
    if(!text){ liveData=null; }                                  // clear: hide live verse; log untouched
    else if(sc){ liveData=sc; }
    else { liveData={ref:"",body:text.trim(),translation:"",rawText:text.trim()}; }
    pgStage.setLive(liveData); setTally({el:$("pgTitle")}, !!liveData);
    if(liveMode){ pvStage.setLive(liveData); setTally(pvMonTally,!!liveData); }
    if(sc&&sc.ref)pushLog(sc.ref);                               // log AFTER setLive (clean exclude-live)
    // On any clear the running list empties; the header stays through a Clear Slide (presentation
    // still active) and hides on a Clear All (full clear) so nothing floats on air.
    const _cn=preview.conn||{};
    if(!text){
      const _full=isFullClear(_cn.clearRule||"pres",_cn.clearLayer||"media",signals);
      if(historyWantsClear(program)) clearLog();
      pgStage.setHeaderHold(!_full); pvStage.setHeaderHold(!_full);
    } else { pgStage.setHeaderHold(true); pvStage.setHeaderHold(true); }
    $("stSlide")&&($("stSlide").textContent=text?(text.length>42?text.slice(0,42)+"\u2026":text):"(clear)");
    $("stLayer")&&($("stLayer").textContent=active===null?"n/a (text mode)":active?"slide ON":"slide CLEAR");
    const on=(active===null)?!!text:!!active;
    $("opSlideTxt")&&($("opSlideTxt").textContent=text?(text.length>34?text.slice(0,34)+"\u2026":text):"(clear)");
    const air=$("opAir"); if(air){ air.classList.toggle("live",on); const at=$("opAirTxt"); if(at)at.textContent=on?"ON AIR":"STANDBY"; }
  }
  const pp=createPP({onUpdate:onSlide, onSignals:(s)=>renderClearDiag(s),
    onReach:(ok)=>{ const dot=$("connDot"); if(dot)dot.className="dot "+(ok?"ok":"err");
      $("stStatus")&&($("stStatus").textContent=ok?"Connected":"No response");
      const od=$("opConnDot"); if(od)od.className="ops-dot "+(ok?"ok":"err");
      const ot=$("opConnTxt"); if(ot)ot.textContent=ok?"ProPresenter connected":"No response"; }});
  let _ppConnSig="";
  function startConsolePP(){ pp.stop(); if(preview.conn.host){ pp.connect(preview.conn.host,preview.conn.port,preview.conn.pollMs); _ppConnSig=JSON.stringify(preview.conn); } }

  /* ---- TRANSITION (take) / REVERT ---- */
  let _takeNonce=0;
  $("btnTrans").onclick=()=>{ _takeNonce=Math.max(Date.now(),_takeNonce+1);   // strictly increasing: a same-ms double-take still replays on Output
    program=clone(preview); program._take=_takeNonce; lsSet(LS_PROGRAM,program); bus.publish(program);
    if(JSON.stringify(program.conn)!==_ppConnSig) startConsolePP();   // keep the console poller on the host we just published
    applyBg(pgMon,program.out.bg); pgStage.setConfig(program); pgStage.setHistory(liveLog);
    pgStage.replayVisible();                 // re-play entrances so animation changes are visible on Program
    refreshURL(); flashTrans(); updateTakeState(); };
  $("btnRevert").onclick=()=>{ preview=clone(program); delete preview._take; savePreview(); selectedId=preview.elements[0]?preview.elements[0].id:null;
    applyPreview(); renderPanels(); updateTakeState(); };
  function flashTrans(){ const b=$("btnTrans"); b.classList.add("flashok"); setTimeout(()=>b.classList.remove("flashok"),700); }
  function flash(btn,txt){ const o=btn.textContent; btn.textContent=txt; setTimeout(()=>btn.textContent=o,1300); }
  // Pending vs live state on the TAKE button + Program panel.
  function cfgSansMeta(c){ const x=clone(c||{}); delete x._take; delete x.conn; return JSON.stringify(x); }
  function updateTakeState(){
    const pending = cfgSansMeta(preview)!==cfgSansMeta(program);
    const b=$("btnTrans"); if(b){ b.classList.toggle("pending",pending); b.classList.toggle("synced",!pending);
      const span=b.querySelector("span"); if(span)span.textContent=pending?"TAKE TO AIR":"ON AIR"; }
    const cap=document.querySelector(".tb-cap"); if(cap)cap.textContent=pending?"Preview has changes \u2014 press to send live to OBS":"Program matches Preview \u2014 you are live";
    const pgt=$("pgMon"); if(pgt)pgt.classList.toggle("pending-diff",pending);
  }

  /* ---- output URL: two modes ---- */
  let urlMode = SERVED ? "relay" : "baked";
  function relayURL(){ return SERVED ? location.origin+"/output" : "http://localhost:"+RELAY_PORT+"/output"; }
  function bakedURL(){ const enc=encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(program)))));
    const base = SERVED ? (location.origin+"/output") : (location.href.split("#")[0].split("?")[0]+"#output");
    return base + (base.indexOf("#")>=0?"&":"#") + "cfg="+enc; }
  function curURL(){ return urlMode==="relay"?relayURL():bakedURL(); }
  function refreshURL(){ $("outUrl").value=curURL();
    $("urlHint").innerHTML = urlMode==="relay"
      ? "Updates OBS automatically every time you press <b>Take</b> &mdash; but needs <code>node relay.js</code> running, and OBS pointed here."
      : "<b>No server needed.</b> Paste into an OBS Browser Source. Re-copy it whenever you change the <i>look</i> and press Take &mdash; verses still update live during service on their own."; }
  document.querySelectorAll("#urlMode button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#urlMode button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); urlMode=b.getAttribute("data-m"); refreshURL(); });
  document.querySelectorAll("#urlMode button").forEach(b=>b.classList.toggle("on",b.getAttribute("data-m")===urlMode));
  $("btnCopyUrl").onclick=async()=>{ try{await navigator.clipboard.writeText(curURL()); flash($("btnCopyUrl"),"Copied \u2713");}catch(e){$("outUrl").select();document.execCommand&&document.execCommand("copy");} };
  $("btnOpenOut").onclick=()=>window.open(curURL(),"pplt_out");
  refreshURL();

  /* =========================================================== PANELS (left) */
  const panels=$("panels");
  function sel(d){ return preview.elements.find(e=>e.id===d); }
  function selected(){ return sel(selectedId)||preview.elements[0]; }

  function renderPanels(){
    panels.innerHTML="";
    panels.append(secLayers());
    const s=selected();
    if(s){ selectedId=s.id; pvStage.select(s.id); panels.append(secInspector(s)); }
    panels.append(secConnection());
    panels.append(secOutput());
    panels.append(secPresets());
  }
  function rebuildInspectorLayoutOnly(){ const s=selected(); if(!s)return;
    ["x","y","w","h"].forEach(k=>{ const inp=document.querySelector(`[data-lay="${k}"]`); if(inp)inp.value=Math.round(s.layout[k]);
      const rv=document.querySelector(`[data-layv="${k}"]`); if(rv)rv.textContent=Math.round(s.layout[k]); }); }

  const secState={};
  function section(title,bodyNodes,open,key){
    key=key||title;
    const isOpen=(key in secState)?secState[key]:!!open;
    const d=el("details",{class:"sec"}); if(isOpen)d.setAttribute("open","");
    d.addEventListener("toggle",()=>{ secState[key]=d.open; });
    const sm=el("summary",null,[el("span",{text:title}),el("span",{class:"chev",html:"&#8250;"})]);
    const b=el("div",{class:"secbody"}); (bodyNodes||[]).forEach(n=>n&&b.append(n));
    d.append(sm,b); return d;
  }

  /* ---- layers list ---- */
  function secLayers(){
    preview.elements=preview.elements.filter(Boolean);   // never render holes
    const list=el("div",{class:"ellist"});
    if(!preview.elements.length) list.append(el("div",{class:"empty",text:"No elements yet. Add one below."}));
    preview.elements.forEach((d,idx)=>{
      if(!d)return;
      const row=el("div",{class:"elrow"+(d.id===selectedId?" sel":"")});
      const eye=iconBtn(d.visible?"eye":"eyeoff", d.visible?"Visible — click to hide":"Hidden — click to show",
        (e)=>{e.stopPropagation();d.visible=!d.visible;applyPreview();renderPanels();}, d.visible?"on":"");
      const nm=el("div",{class:"nm",title:"Select",onclick:()=>{selectedId=d.id;pvStage.select(d.id);renderPanels();},
        html:`${escapeHtml(d.name||TYPE_LABELS[d.type])} <span class="ty">${d.type}</span>`});
      const up=iconBtn("up","Move up",(e)=>{e.stopPropagation();moveEl(d.id,-1);});
      const dn=iconBtn("down","Move down",(e)=>{e.stopPropagation();moveEl(d.id,1);});
      const del=iconBtn("trash","Delete",(e)=>{e.stopPropagation();
        if(confirm("Delete \""+(d.name||d.type)+"\"?")){ const i=preview.elements.findIndex(x=>x&&x.id===d.id); if(i<0)return;
          preview.elements.splice(i,1);
          if(selectedId===d.id)selectedId=preview.elements[0]?preview.elements[0].id:null; applyPreview();renderPanels();}},"danger");
      row.append(eye,nm,up,dn,del); list.append(row);
    });
    const add=el("div",{class:"addmenu"});
    ADD_TYPES.forEach(t=>add.append(el("button",{class:"btn tiny",text:"+ "+TYPE_LABELS[t],
      onclick:()=>{ const ne=createElement(t); preview.elements.push(ne); selectedId=ne.id; applyPreview(); renderPanels(); }})));
    return section("Layers  ("+preview.elements.length+")",[list,add],true,"layers");
  }
  function moveEl(id,dir){ const a=preview.elements; const idx=a.findIndex(e=>e&&e.id===id); if(idx<0)return;
    const j=idx+dir; if(j<0||j>=a.length)return; [a[idx],a[j]]=[a[j],a[idx]]; applyPreview(); renderPanels(); }

  /* ---- control builders ---- */
  function rowRange(label,val,min,max,step,unit,onCh,key){
    const out=el("span",{class:"rv",text:(unit?val+unit:val)}); if(key)out.setAttribute("data-layv",key);
    const inp=el("input",{type:"range",min,max,step,value:val}); if(key)inp.setAttribute("data-lay",key);
    inp.oninput=()=>{ const v=parseFloat(inp.value); out.textContent=unit?v+unit:v; onCh(v); };
    return el("div",null,[el("label",{class:"fld",text:label}),el("div",{class:"row"},[inp,out])]);
  }
  function rowColor(label,val,onCh){
    const c=el("input",{type:"color",value:toHex(val)}); const t=el("input",{type:"text",value:val});
    c.oninput=()=>{t.value=c.value;onCh(c.value);};
    t.oninput=()=>{ if(/^#?[0-9a-fA-F]{6,8}$/.test(t.value)){const v=t.value[0]==="#"?t.value:"#"+t.value;c.value=v.slice(0,7);onCh(v);} };
    return el("div",null,[el("label",{class:"fld",text:label}),el("div",{class:"cw"},[c,t])]);
  }
  function rowText(label,val,onCh,ph){ const i=el("input",{type:"text",value:val||"",placeholder:ph||""});
    i.oninput=()=>onCh(i.value); return el("div",null,[el("label",{class:"fld",text:label}),i]); }
  function rowArea(label,val,onCh){ const t=el("textarea",{},val||""); t.value=val||"";
    t.oninput=()=>onCh(t.value); return el("div",null,[el("label",{class:"fld",text:label}),t]); }
  function rowSelect(label,val,opts,onCh){ const s=el("select");
    opts.forEach(o=>{const v=Array.isArray(o)?o[0]:o,l=Array.isArray(o)?o[1]:o; const op=el("option",{value:v,text:l}); if(String(v)===String(val))op.selected=true; s.append(op);});
    s.onchange=()=>onCh(s.value); return el("div",null,[el("label",{class:"fld",text:label}),s]); }
  function rowToggle(label,val,onCh){ const i=el("input",{type:"checkbox"}); i.checked=!!val;
    i.onchange=()=>onCh(i.checked);
    return el("label",{class:"sw"},[i,el("span",{class:"tk"}),document.createTextNode(" "+label)]); }
  function rowSeg(label,val,opts,onCh){ const seg=el("div",{class:"seg"});
    opts.forEach(o=>{const v=Array.isArray(o)?o[0]:o,l=Array.isArray(o)?o[1]:o;
      const b=el("button",{text:l}); if(String(v)===String(val))b.classList.add("on");
      b.onclick=()=>{ [...seg.children].forEach(x=>x.classList.remove("on")); b.classList.add("on"); onCh(v); };
      seg.append(b);});
    return el("div",null,[el("label",{class:"fld",text:label}),seg]); }
  function split(a,b){ return el("div",{class:"row split"},[a,b]); }
  function group(title,nodes){ const g=el("div",{class:"grp"}); g.append(el("div",{class:"gh",text:title})); nodes.forEach(n=>n&&g.append(n)); return g; }
  function toHex(v){ v=v||"#000000"; return v[0]==="#"?v.slice(0,7):"#"+v.slice(0,6); }
  function escapeHtml(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  function typeGroup(title,styleObj,onCh){
    const fonts=[["'Oswald','Arial Narrow',sans-serif","Oswald (condensed)"],["'Bebas Neue',sans-serif","Bebas Neue"],
      ["'Barlow Condensed',sans-serif","Barlow Condensed"],["Georgia,'Times New Roman',serif","Georgia (serif)"],
      ["'Helvetica Neue',Arial,sans-serif","Helvetica / Arial"],["'Libre Franklin',sans-serif","Libre Franklin"],
      ["'Trebuchet MS',sans-serif","Trebuchet"],["Impact,sans-serif","Impact"],["Verdana,sans-serif","Verdana"]];
    const customFont=el("input",{type:"text",value:styleObj.font,placeholder:"custom font-family"});
    customFont.oninput=()=>{styleObj.font=customFont.value;onCh();};
    return group(title,[
      rowSelect("Font",styleObj.font,fonts,(v)=>{styleObj.font=v;customFont.value=v;onCh();}),
      customFont,
      split(rowRange("Size",styleObj.size,10,160,1,"",(v)=>{styleObj.size=v;onCh();}),
            rowSelect("Weight",styleObj.weight,["300","400","500","600","700","800","900"],(v)=>{styleObj.weight=v;onCh();})),
      rowColor("Color",styleObj.color,(v)=>{styleObj.color=v;onCh();}),
      split(rowRange("Tracking",styleObj.letter||0,-3,16,0.5,"",(v)=>{styleObj.letter=v;onCh();}),
            rowRange("Line ht",styleObj.lh||1.2,0.9,2.2,0.02,"",(v)=>{styleObj.lh=v;onCh();})),
      split(rowToggle("Uppercase",styleObj.upper,(v)=>{styleObj.upper=v;onCh();}),
            rowToggle("Italic",styleObj.italic,(v)=>{styleObj.italic=v;onCh();})),
      rowRange("Max lines (0 = no limit)",styleObj.maxLines||0,0,12,1,"",(v)=>{styleObj.maxLines=v;onCh();})
    ]);
  }

  /* ---- the inspector for the selected element ---- */
  function secInspector(d){
    const onCh=()=>applyPreview();
    const nodes=[];
    nodes.push(rowText("Element name",d.name,(v)=>{d.name=v;applyPreview();
      const nm=document.querySelector(".elrow.sel .nm"); if(nm)nm.innerHTML=`${escapeHtml(v||TYPE_LABELS[d.type])} <span class="ty">${d.type}</span>`;}));

    // CONTENT (per type)
    nodes.push(contentGroup(d,onCh));

    // POSITION & SIZE
    nodes.push(group("Position & size (drag in preview too)",[
      split(rowRange("X",d.layout.x,0,STAGE_W,1,"",(v)=>{d.layout.x=v;layoutLive(d);},"x"),
            rowRange("Y",d.layout.y,0,STAGE_H,1,"",(v)=>{d.layout.y=v;layoutLive(d);},"y")),
      split(rowRange("Width",d.layout.w,80,STAGE_W,1,"",(v)=>{d.layout.w=v;layoutLive(d);},"w"),
            rowRange("Height",d.layout.h,50,STAGE_H,1,"",(v)=>{d.layout.h=v;layoutLive(d);},"h")),
      el("div",{class:"row"},[
        el("button",{class:"btn tiny",text:"Lower third",onclick:()=>{quickPos(d,"lower");}}),
        el("button",{class:"btn tiny",text:"Bottom L",onclick:()=>{quickPos(d,"bl");}}),
        el("button",{class:"btn tiny",text:"Top L",onclick:()=>{quickPos(d,"tl");}}),
        el("button",{class:"btn tiny",text:"Center",onclick:()=>{quickPos(d,"center");}})
      ])
    ]));

    // DISPLAY & LAYERING
    nodes.push(displayGroup(d,onCh));

    // BACKGROUND
    const b=d.box;
    nodes.push(group("Background shape",[
      rowSelect("Style",b.style,[["glass","Glass (blur)"],["solid","Solid"],["bar","Flat bar"],["minimal","None / text only"]],(v)=>{b.style=v;onCh();}),
      rowSelect("Shape",b.shape||"rect",[["rect","Rectangle"],["pill","Pill (full round)"],["cut","Cut corners"],["parallelogram","Parallelogram \u2571"],["parallelogramR","Parallelogram \u2572"],["chevron","Chevron \u25b6"],["tab","Tab corner"]],(v)=>{b.shape=v;onCh();}),
      rowToggle("Gradient fill",b.useGrad,(v)=>{b.useGrad=v;onCh();}),
      split(rowColor("Fill",b.fill1,(v)=>{b.fill1=v;onCh();}),rowColor("Fill 2",b.fill2,(v)=>{b.fill2=v;onCh();})),
      rowRange("Gradient angle",b.gradAngle,0,360,5,"\u00b0",(v)=>{b.gradAngle=v;onCh();}),
      split(rowRange("Opacity",b.opacity,0,1,0.02,"",(v)=>{b.opacity=v;onCh();}),
            rowRange("Corner radius",b.radius,0,80,1,"",(v)=>{b.radius=v;onCh();})),
      split(rowRange("Pad X",b.padX,0,160,2,"",(v)=>{b.padX=v;onCh();}),
            rowRange("Pad Y",b.padY,0,160,2,"",(v)=>{b.padY=v;onCh();})),
      split(rowToggle("Drop shadow",b.shadow,(v)=>{b.shadow=v;onCh();}),
            rowRange("Blur",b.blur,0,40,1,"",(v)=>{b.blur=v;onCh();})),
      split(rowToggle("Bevel (3D edge)",!!b.bevel,(v)=>{b.bevel=v;onCh();}),
            rowRange("Bevel depth",b.bevelDepth,1,12,1,"",(v)=>{b.bevelDepth=v;onCh();})),
      split(rowToggle("Border",b.border,(v)=>{b.border=v;onCh();}),
            rowRange("Border w",b.borderW,0,12,1,"",(v)=>{b.borderW=v;onCh();})),
      rowColor("Border color",b.borderColor,(v)=>{b.borderColor=v;onCh();}),
      rowToggle("Accent bar",b.accent,(v)=>{b.accent=v;onCh();}),
      split(rowColor("Accent color",b.accentColor,(v)=>{b.accentColor=v;onCh();}),
            rowRange("Accent w",b.accentW,0,40,1,"",(v)=>{b.accentW=v;onCh();})),
      rowSeg("Accent side",b.accentSide,[["left","Left"],["right","Right"]],(v)=>{b.accentSide=v;onCh();}),
      split(rowSeg("Align",b.align,[["left","L"],["center","C"],["right","R"]],(v)=>{b.align=v;onCh();}),
            rowSeg("V-align",b.valign,[["top","Top"],["center","Mid"],["bottom","Bot"]],(v)=>{b.valign=v;onCh();}))
    ]));

    // BACKGROUND IMAGE / VIDEO
    nodes.push(mediaGroup(b,onCh));

    // ANIMATION (entrance / exit)
    const a=d.anim;
    const ANOPTS=[["fade","Fade"],["slide-up","Slide up"],["slide-down","Slide down"],["slide-left","Slide L"],["slide-right","Slide R"],["scale","Scale"],["zoom-in","Zoom in"],["zoom-out","Zoom out"],["pop","Pop"],["blur","Blur"],["wipe","Wipe"],["fly","Fly (angle)"]];
    const animRows=[
      split(rowSelect("In",a.in,ANOPTS,(v)=>{a.in=v;onCh();renderPanels();}),
            rowSelect("Out",a.out,ANOPTS,(v)=>{a.out=v;onCh();renderPanels();})),
      split(rowRange("In ms",a.durIn,100,2000,20,"",(v)=>{a.durIn=v;onCh();}),
            rowRange("Out ms",a.durOut,100,2000,20,"",(v)=>{a.durOut=v;onCh();})),
      rowRange("Start delay",a.delay,0,2000,20,"ms",(v)=>{a.delay=v;onCh();}),
      rowSelect("Easing",a.easing,[["cubic-bezier(.22,.61,.36,1)","Smooth out"],["cubic-bezier(.65,0,.35,1)","In-out"],["cubic-bezier(.34,1.56,.64,1)","Overshoot"],["ease","Default"],["linear","Linear"]],(v)=>{a.easing=v;onCh();})
    ];
    if(a.in==="fly"||a.out==="fly")
      animRows.push(split(rowRange("Fly angle",a.angle,0,360,5,"\u00b0",(v)=>{a.angle=v;onCh();}),
                          rowRange("Fly distance",a.dist,10,600,5,"px",(v)=>{a.dist=v;onCh();})));
    animRows.push(el("div",{class:"row"},[el("button",{class:"btn ghost sm full",text:"Test animation in preview",onclick:()=>testAnim(d)})]));
    nodes.push(group("Animation (entrance / exit)",animRows));

    // MOTION (continuous loop)
    nodes.push(motionGroup(d,onCh));

    return section("Element: "+(d.name||TYPE_LABELS[d.type]),nodes,true,"element");
  }

  function importMedia(file,cb){
    const isImg=/^image\//.test(file.type), isGif=/gif$/i.test(file.type), isVid=/^video\//.test(file.type);
    if(isImg&&!isGif&&window.FileReader&&document.createElement("canvas").getContext){
      const fr=new FileReader();
      fr.onload=()=>{ const img=new Image();
        img.onload=()=>{ const max=1600; let w=img.width||0,h=img.height||0;
          const sc=Math.min(1,max/Math.max(w,h||1)); const cw=Math.max(1,Math.round(w*sc)),ch=Math.max(1,Math.round(h*sc));
          const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch; const ctx=cv.getContext("2d");
          if(!ctx){ cb(fr.result,"image"); return; }
          ctx.drawImage(img,0,0,cw,ch);
          const png=/png$/i.test(file.type)||/^image\/png/.test(file.type);
          try{ cb(cv.toDataURL(png?"image/png":"image/jpeg",0.85),"image"); }catch(e){ cb(fr.result,"image"); } };
        img.onerror=()=>cb(fr.result,"image"); img.src=fr.result; };
      fr.readAsDataURL(file);
    } else { const fr=new FileReader(); fr.onload=()=>cb(fr.result,isVid?"video":"image"); fr.readAsDataURL(file); }
  }
  function mediaGroup(b,onCh){
    const hasM=!!b.mediaSrc, isUrl=hasM&&/^https?:/i.test(b.mediaSrc);
    const fileInput=el("input",{type:"file",accept:"image/*,video/*",style:"display:none"});
    fileInput.onchange=()=>{ const f=fileInput.files&&fileInput.files[0]; if(!f)return;
      if(f.size>8*1024*1024 && /^video\//.test(f.type)){
        alert("That video is "+(f.size/1048576).toFixed(1)+" MB. Inlining a large video can exceed local storage and break the OBS output.\n\nHost it (a direct link, or a local web server) and paste the URL in the “…or paste media URL” field below.");
        fileInput.value=""; return;
      }
      importMedia(f,(url,kind)=>{ b.mediaSrc=url; b.mediaType=kind; onCh(); renderPanels(); }); };
    const rows=[
      el("div",{class:"row"},[
        el("button",{class:"btn sm",style:"flex:1",text:hasM?"Replace image / video\u2026":"Import image / video\u2026",onclick:()=>fileInput.click()}),
        hasM?el("button",{class:"btn sm danger",text:"Remove",onclick:()=>{b.mediaSrc="";b.mediaType="";onCh();renderPanels();}}):null
      ]),
      fileInput,
      rowText("\u2026or paste media URL",isUrl?b.mediaSrc:"",(v)=>{const u=v.trim();b.mediaSrc=u;b.mediaType=/\.(mp4|webm|ogv|mov)(\?|$)/i.test(u)?"video":"image";onCh();renderPanels();},"https://\u2026  image or mp4")
    ];
    if(hasM){
      rows.push(rowSelect("Fit",b.mediaFit,[["cover","Fill & crop (cover)"],["contain","Fit inside (contain)"],["stretch","Stretch to fill"],["center","Center (no scale)"],["tile","Tile / repeat"]],(v)=>{b.mediaFit=v;onCh();}));
      rows.push(split(rowRange("Zoom / crop",b.mediaZoom,1,3,0.05,"x",(v)=>{b.mediaZoom=v;onCh();}),
                      rowRange("Media opacity",b.mediaOpacity,0,1,0.02,"",(v)=>{b.mediaOpacity=v;onCh();})));
      rows.push(split(rowRange("Focal X",b.mediaX,0,100,1,"%",(v)=>{b.mediaX=v;onCh();}),
                      rowRange("Focal Y",b.mediaY,0,100,1,"%",(v)=>{b.mediaY=v;onCh();})));
      rows.push(split(rowRange("Dark scrim",b.scrim,0,0.85,0.02,"",(v)=>{b.scrim=v;onCh();}),
                      rowColor("Scrim color",b.scrimColor,(v)=>{b.scrimColor=v;onCh();})));
    }
    return group("Background image / video",rows);
  }

  function motionGroup(d,onCh){
    const lp=d.loop||(d.loop=loopDefaults());
    const rows=[ rowSelect("Continuous motion",lp.type,[
      ["none","None (static)"],["pulse","Pulse / breathe"],["glow","Glow pulse"],
      ["float","Float / drift"],["sway","Sway"],["spin","Spin"],["shine","Shine sweep"],
      ["gradientShift","Gradient shift"],["ticker","Ticker \u2014 banner scroll"],["rollV","Credits roll \u2191"]],
      (v)=>{lp.type=v;onCh();renderPanels();}) ];
    if(lp.type!=="none"){
      const fast=(lp.type==="ticker"||lp.type==="rollV"||lp.type==="spin"||lp.type==="shine"||lp.type==="gradientShift");
      rows.push(rowRange(fast?"Cycle seconds":"Speed (slower \u2192 faster cycle)",lp.speed,fast?4:1.5,fast?40:12,0.5,"s",(v)=>{lp.speed=v;onCh();}));
      if(lp.type==="glow"){
        rows.push(rowSelect("Glow color",lp.colorMode||"accent",[["accent","Match accent bar"],["single","Single color\u2026"],["dual","Two colors\u2026"],["rainbow","Rainbow cycle"]],(v)=>{lp.colorMode=v;onCh();renderPanels();}));
        if(lp.colorMode==="single") rows.push(rowColor("Color",lp.color,(v)=>{lp.color=v;onCh();}));
        if(lp.colorMode==="dual") rows.push(split(rowColor("Color A",lp.color,(v)=>{lp.color=v;onCh();}),rowColor("Color B",lp.color2,(v)=>{lp.color2=v;onCh();})));
        rows.push(rowRange("Glow size",lp.size,2,60,1,"px",(v)=>{lp.size=v;onCh();}));
      }
      if(lp.type==="pulse"||lp.type==="float"||lp.type==="sway")
        rows.push(rowRange("Intensity",lp.intensity,1,40,1,"",(v)=>{lp.intensity=v;onCh();}));
      if(lp.type==="float")
        rows.push(split(rowSelect("Direction",lp.dir,[["left","Left"],["right","Right"],["up","Up"],["down","Down"],["custom","Custom angle"]],(v)=>{lp.dir=v;onCh();renderPanels();}),
                        lp.dir==="custom"?rowRange("Angle",lp.angle,0,360,5,"\u00b0",(v)=>{lp.angle=v;onCh();}):el("span")));
      if(lp.type==="ticker")
        rows.push(rowSeg("Scroll direction",lp.dir==="right"?"right":"left",[["left","\u25c0 Right-to-left"],["right","Left-to-right \u25b6"]],(v)=>{lp.dir=v;onCh();}));
      if(lp.type==="ticker"||lp.type==="rollV")
        rows.push(el("div",{style:"font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:2px",text:"Tip: ticker shows this element's text on a seamless loop. Great for announcements or a scrolling verse. Widen the box for a banner."}));
    }
    return group("Motion / loop",rows);
  }

  function layoutLive(d){ const r=pvStage.getRenderer(d.id); if(r)r.applyLayout(d); savePreview(); }
  function quickPos(d,where){ const L=d.layout;
    if(where==="lower"){L.x=120;L.y=820;L.w=Math.max(L.w,1100);L.h=Math.max(L.h,160);}
    else if(where==="bl"){L.x=120;L.y=1080-L.h-100;}
    else if(where==="tl"){L.x=120;L.y=80;}
    else if(where==="center"){L.x=Math.round((STAGE_W-L.w)/2);L.y=Math.round((STAGE_H-L.h)/2);}
    applyPreview(); renderPanels(); }
  function testAnim(d){ const r=pvStage.getRenderer(d.id); if(!r)return; r.hide();
    setTimeout(()=>{ let c;
      if(d.type==="history") c={items:liveLog};
      else if(d.type==="eventList"){ const lines=(d.content.items||"").split("\n").map(s=>s.trim()).filter(Boolean); c={items:lines.map((t,i)=>({id:"m"+i,ref:t}))}; }

      r.showContent(d,c); },420); }

  /* ---- presets + folders ---- */
  function secPresets(){
    const wrap=el("div");
    presets.folders.forEach((f,fi)=>{
      const fol=el("div",{class:"folder"});
      const fh=el("div",{class:"fh"},[
        el("span",{class:"fico",html:svg("folder")}),
        el("span",{class:"fn",text:f.name+"  ("+f.items.length+")",onclick:()=>{f._open=!f._open;renderPanels();}}),
        iconBtn("save","Save current preview into this folder",()=>savePresetTo(fi)),
        iconBtn("pencil","Rename folder",()=>{const n=prompt("Folder name:",f.name);if(n){f.name=n;savePresets(presets);renderPanels();}}),
        iconBtn("trash","Delete folder",()=>{if(confirm("Delete folder + its presets?")){presets.folders.splice(fi,1);savePresets(presets);renderPanels();}},"danger")
      ]);
      fol.append(fh);
      if(f._open!==false){ f.items.forEach((p,pi)=>{
        fol.append(el("div",{class:"preset"},[
          el("span",{class:"pn",title:"Load into Preview",text:p.name,onclick:()=>loadPreset(p)}),
          iconBtn("refresh","Overwrite with current preview",()=>{p.config=snapshotForPreset();savePresets(presets);}),
          iconBtn("pencil","Rename",()=>{const n=prompt("Preset name:",p.name);if(n){p.name=n;savePresets(presets);renderPanels();}}),
          iconBtn("trash","Delete",()=>{f.items.splice(pi,1);savePresets(presets);renderPanels();},"danger")
        ]));
      }); }
      wrap.append(fol);
    });
    const actions=el("div",{class:"row",style:"flex-wrap:wrap;gap:8px"},[
      el("button",{class:"btn sm",html:svg("plus")+" New folder",onclick:()=>{const n=prompt("New folder name:","Folder");if(n){presets.folders.push({id:uid(),name:n,items:[]});savePresets(presets);renderPanels();}}}),
      el("button",{class:"btn sm",html:svg("save")+" Save preview as preset",onclick:()=>savePresetTo(0)}),
      el("button",{class:"btn ghost sm",html:svg("download")+" Export",onclick:exportPresets}),
      el("button",{class:"btn ghost sm",html:svg("upload")+" Import",onclick:importPresets})
    ]);
    return section("Presets & folders",[wrap,actions],false,"presets");
  }
  function snapshotForPreset(){ const c=clone(preview); delete c.conn; return c; }
  function savePresetTo(fi){ const name=prompt("Preset name:","Preset "+(presets.folders[fi].items.length+1)); if(!name)return;
    presets.folders[fi].items.push({id:uid(),name,config:snapshotForPreset()}); savePresets(presets); renderPanels(); }
  function loadPreset(p){ const keepConn=clone(preview.conn); preview=deepMerge(defaultConfig(),Object.assign({},p.config,{conn:keepConn}));
    // ensure element ids exist
    (preview.elements||[]).forEach(e=>{ if(!e.id)e.id=uid(); });
    selectedId=preview.elements[0]?preview.elements[0].id:null; applyPreview(); renderPanels(); }
  function flashName(n){ /* no-op visual */ }
  function exportPresets(){ const blob=new Blob([JSON.stringify(presets,null,2)],{type:"application/json"});
    const a=el("a",{href:URL.createObjectURL(blob),download:"lower-thirds-presets.json"}); a.click(); }
  function importPresets(){ const inp=el("input",{type:"file",accept:".json"});
    inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();
      rd.onload=()=>{try{const p=JSON.parse(rd.result); if(p.folders){presets=p;savePresets(presets);renderPanels();}}catch(e){alert("Bad preset file.");}};
      rd.readAsText(f);}; inp.click(); }

  /* ---- OPERATOR MODE (Showcaller / Simple) ---- */
  const LS_VIEW="pplt.view.v1";
  let viewMode="builder", currentLookId=null;
  function blankLook(){ const c=defaultConfig(); c.elements=[]; return c; }
  function setView(m){
    if(m!=="builder"&&m!=="showcaller"&&m!=="simple")m="builder";
    viewMode=m; lsSet(LS_VIEW,m);
    const root=$("console-root");
    root.classList.toggle("op",m!=="builder");
    root.classList.toggle("skin-showcaller",m==="showcaller");
    root.classList.toggle("skin-simple",m==="simple");
    const vs=$("viewSwitch"); if(vs)[...vs.querySelectorAll("button")].forEach(b=>b.classList.toggle("on",b.dataset.view===m));
    if(m!=="builder")renderOpLooks();
    requestAnimationFrame(()=>{ try{ pvStage.setScale(fitScaler(pvScaler,pvMon)); fitScaler(pgScaler,pgMon); }catch(e){} });
  }
  function renderOpLooks(){
    const grid=$("opLookGrid"); if(!grid)return; grid.innerHTML="";
    const blank=el("button",{class:"ol-tile blank"+(currentLookId==="__blank__"?" sel":""),onclick:()=>{
        const keepConn=clone(preview.conn); preview=Object.assign(blankLook(),{conn:keepConn});
        selectedId=null; currentLookId="__blank__"; applyPreview(); renderPanels(); renderOpLooks(); }},
      [el("div",{class:"t-name",text:"Blank / Clear"}),el("div",{class:"t-sub",text:"empty the screen"})]);
    grid.append(blank);
    let n=0;
    (presets.folders||[]).forEach(f=>{ (f.items||[]).forEach(it=>{ n++;
      const tile=el("button",{class:"ol-tile"+(currentLookId===it.id?" sel":""),onclick:()=>{
          currentLookId=it.id; loadPreset(it); renderOpLooks(); }},
        [el("div",{class:"t-name",text:it.name||("Look "+n)}),el("div",{class:"t-sub",text:f.name||"Presets"})]);
      grid.append(tile); }); });
    if(n===0) grid.append(el("div",{class:"ol-empty",text:"No saved looks yet. In Builder, style a look and Save it as a preset \u2014 it'll appear here as a tile."}));
  }
  { const vs=$("viewSwitch"); if(vs)[...vs.querySelectorAll("button")].forEach(b=>{ b.onclick=()=>setView(b.dataset.view); }); }
  setInterval(()=>{ const c=$("opClock"); if(c){ const d=new Date(),p=(x)=>String(x).padStart(2,"0");
    c.textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); } },1000);

  /* ---- go ---- */
  renderPanels();
  applyBg(pgMon,program.out.bg); pgStage.setConfig(program); pgStage.setHistory(liveLog);
  applyPreview(); pvStage.setHistory(liveLog);
  const ro1=new ResizeObserver(()=>pvStage.setScale(fitScaler(pvScaler,pvMon))); ro1.observe(pvMon); pvStage.setScale(fitScaler(pvScaler,pvMon));
  const ro2=new ResizeObserver(()=>fitScaler(pgScaler,pgMon)); ro2.observe(pgMon); fitScaler(pgScaler,pgMon);
  startConsolePP();
  setView(localStorage.getItem(LS_VIEW)||"builder");
  updateTakeState();
  setTimeout(()=>{ if(!liveMode){ pvStage.setLive(SAMPLE1); setTally(pvMonTally,true); } },300);
}
</script>
</body>
</html>
