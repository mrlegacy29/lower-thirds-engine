name: Release

# Push a version tag (e.g. v1.0.1) and this builds the Windows installer and
# publishes a GitHub Release. Running copies of the app then see the update.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # electron-builder 26 requires Node >= 22.12

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Pre-create the release so electron-builder only has to UPLOAD into it.
      # Its publisher races when it creates the release and uploads assets at the
      # same time (v1.0.1 ended up with only the .blockmap, missing the .exe and
      # latest.yml). Creating it up front removes that race. Idempotent on re-runs.
      - name: Ensure the GitHub release exists first
        shell: bash
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "Automated release ${{ github.ref_name }}" || echo "release already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (electron-builder)
        run: npx --no-install electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
