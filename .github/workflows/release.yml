name: Release

# Push a version tag (e.g. v1.0.1) and this builds the Windows installer and
# publishes a GitHub Release. Running copies of the app then see the update.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # electron-builder 26 requires Node >= 22.12

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Build WITHOUT electron-builder's publisher — it races when creating the
      # GitHub release and uploading assets, which split the v1.0.0 and v1.0.1
      # releases and dropped the installer/latest.yml. We build locally, then
      # upload the exact files ourselves. Fully deterministic, and `gh release
      # upload` failing loudly means we never get a half-published release.
      - name: Build installer (no auto-publish)
        run: npx --no-install electron-builder --win --publish never

      - name: Show build output
        shell: bash
        run: ls -la release/

      - name: Create release and upload assets
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "Lower Thirds Engine ${{ github.ref_name }}" || echo "release already exists"
          gh release upload "${{ github.ref_name }}" release/latest.yml release/*Setup*.exe release/*Setup*.exe.blockmap --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
